<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYA Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root {
    --bg-deep: #0C2436; --bg-surface: #163C57; --paper:#FFFCF5; --paper-dim:#F2EEE2;
    --ink:#1B1F23; --ink-dim:#5B6270; --text-on-navy:#F5F8FA; --text-on-navy-dim:#9FB2C2;
    --amber:#F67F01; --amber-dim:rgba(246,127,1,0.20); --teal:#20B6A6; --teal-dim:rgba(32,182,166,0.20);
    --coral:#E63950; --coral-dim:rgba(230,57,80,0.20); --grey:#AEB9C7; --grey-dim:rgba(174,185,199,0.20); --line:rgba(255,255,255,0.12);
  }
  * { box-sizing:border-box; }
  .d3-root { font-family:'Inter',sans-serif; background:var(--bg-deep); color:var(--text-on-navy); min-height:100%; padding:24px 20px 60px;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 1px); background-size:22px 22px; }
  .d3-wrap { max-width:1220px; margin:0 auto; }
  .d3-mono { font-family:'IBM Plex Mono',monospace; }

  .d3-login { max-width:440px; margin:50px auto; text-align:center; }
  .d3-login h1 { font-family:'Space Grotesk',sans-serif; font-size:26px; margin-bottom:4px; letter-spacing:.02em; }
  .d3-login p.sub { color:var(--text-on-navy-dim); font-size:13px; margin-bottom:26px; }
  .d3-agence-block { margin-bottom:18px; text-align:left; }
  .d3-agence-title { font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--amber); margin-bottom:8px; }
  .d3-profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .d3-profile-btn { background:var(--bg-surface); border:1px solid var(--line); border-radius:12px; padding:14px 10px; cursor:pointer; color:var(--text-on-navy); font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13.5px; }
  .d3-profile-btn:hover { background:#253461; }
  .d3-profile-btn:focus-visible { outline:2px solid var(--amber); outline-offset:2px; }
  .d3-boss-btn { width:100%; margin-top:6px; background:var(--amber); color:#201404; border:none; border-radius:12px; padding:14px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; cursor:pointer; }
  .d3-pass-box { background:var(--bg-surface); border:1px solid var(--line); border-radius:12px; padding:20px; text-align:left; }
  .d3-pass-box input { width:100%; background:var(--bg-deep); border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--text-on-navy); font-size:15px; margin:10px 0; }
  .d3-error { color:var(--coral); font-size:13px; margin-top:6px; }
  .d3-back { background:none; border:none; color:var(--text-on-navy-dim); font-size:12.5px; cursor:pointer; margin-top:12px; }

  .d3-header { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:18px; }
  .d3-eyebrow { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin:0 0 6px; }
  .d3-title { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; margin:0; }
  .d3-who { font-size:12px; color:var(--text-on-navy-dim); }
  .d3-logout { background:none; border:1px solid var(--line); color:var(--text-on-navy-dim); border-radius:8px; padding:5px 11px; font-size:11.5px; cursor:pointer; margin-left:8px; }

  .d3-agence-switch { display:flex; gap:4px; background:var(--bg-surface); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:14px; width:fit-content; }
  .d3-agence-switch button { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12.5px; padding:7px 13px; border-radius:7px; border:none; background:transparent; color:var(--text-on-navy-dim); cursor:pointer; }
  .d3-agence-switch button.active { background:var(--teal); color:#04231f; }

  .d3-tabs { display:flex; gap:4px; background:var(--bg-surface); border:1px solid var(--line); border-radius:10px; padding:4px; flex-wrap:wrap; }
  .d3-tab { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12.5px; padding:7px 12px; border-radius:7px; border:none; background:transparent; color:var(--text-on-navy-dim); cursor:pointer; }
  .d3-tab:hover { color:var(--text-on-navy); }
  .d3-tab.active { background:var(--amber); color:#201404; }
  .d3-tab:focus-visible { outline:2px solid var(--amber); outline-offset:2px; }

  .d3-panel { background:var(--bg-surface); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px; }
  .d3-panel h3 { font-family:'Space Grotesk',sans-serif; font-size:15px; margin:0 0 14px; }
  .d3-field { margin-bottom:12px; }
  .d3-field label { display:block; font-size:12px; color:var(--text-on-navy-dim); margin-bottom:5px; font-family:'IBM Plex Mono',monospace; }
  .d3-field input, .d3-field select { width:100%; background:var(--bg-deep); border:1px solid var(--line); border-radius:8px; padding:9px 10px; color:var(--text-on-navy); font-size:14px; }
  .d3-field input:focus-visible, .d3-field select:focus-visible { outline:2px solid var(--amber); outline-offset:1px; }
  .d3-row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .d3-row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:700px){ .d3-row2,.d3-row3{ grid-template-columns:1fr; } }

  .d3-btn { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; padding:10px 16px; border-radius:8px; border:none; cursor:pointer; background:var(--amber); color:#201404; }
  .d3-btn:hover { filter:brightness(1.08); }
  .d3-btn-ghost { background:transparent; border:1px solid var(--line); color:var(--text-on-navy); }
  .d3-btn-small { padding:6px 10px; font-size:12px; }

  .d3-grid2 { display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
  @media (max-width:900px){ .d3-grid2{ grid-template-columns:1fr; } }

  .d3-kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px; }
  @media (max-width:960px){ .d3-kpi-row{ grid-template-columns:repeat(2,1fr);} }
  .d3-kpi { background:var(--bg-surface); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .d3-kpi-label { font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; color:var(--text-on-navy-dim); margin:0 0 7px; }
  .d3-kpi-value { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; margin:0; }
  .d3-kpi.amber .d3-kpi-value{ color:var(--amber);} .d3-kpi.teal .d3-kpi-value{ color:var(--teal);} .d3-kpi.coral .d3-kpi-value{ color:var(--coral);}

  table.d3-table { width:100%; border-collapse:collapse; background:var(--bg-surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; font-size:12.8px; }
  table.d3-table th { text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-on-navy-dim); padding:8px 11px; border-bottom:1px solid var(--line); }
  table.d3-table td { padding:8px 11px; border-bottom:1px solid var(--line); vertical-align:middle; }
  table.d3-table tr:last-child td { border-bottom:none; }
  .d3-badge { display:inline-block; font-size:10.5px; font-family:'IBM Plex Mono',monospace; padding:3px 8px; border-radius:999px; text-transform:uppercase; }
  .d3-badge.validee, .d3-badge.livree { background:var(--teal-dim); color:var(--teal); }
  .d3-badge.annulee { background:var(--coral-dim); color:var(--coral); }
  .d3-badge.attente { background:var(--amber-dim); color:var(--amber); }
  .d3-badge.cours { background:var(--grey-dim); color:var(--grey); }
  .d3-badge.salarie { background:var(--grey-dim); color:var(--grey); }
  .d3-badge.independant { background:var(--amber-dim); color:var(--amber); }
  .d3-badge.locked { background:var(--coral-dim); color:var(--coral); }
  .d3-badge.active-acc { background:var(--teal-dim); color:var(--teal); }

  .d3-period-toggle { display:flex; gap:8px; margin-bottom:14px; }
  .d3-period-toggle button { background:var(--bg-surface); border:1px solid var(--line); color:var(--text-on-navy); padding:6px 14px; border-radius:999px; font-size:12px; cursor:pointer; }
  .d3-period-toggle button.active { background:var(--amber); color:#201404; border-color:var(--amber); }

  .d3-empty { text-align:center; padding:26px 20px; color:var(--text-on-navy-dim); font-size:13px; }
  .d3-note { margin-top:18px; font-size:11.5px; color:var(--text-on-navy-dim); border-top:1px solid var(--line); padding-top:12px; }
  .d3-audit-item { padding:8px 0; border-bottom:1px dashed var(--line); font-size:12.5px; }
  .d3-audit-item:last-child { border-bottom:none; }
  .d3-audit-time { color:var(--text-on-navy-dim); font-size:10.5px; font-family:'IBM Plex Mono',monospace; }
  .d3-hist { font-size:11px; color:var(--text-on-navy-dim); margin-top:3px; }
  .d3-inline-form { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
  .d3-inline-form .d3-field { margin-bottom:0; flex:1; min-width:100px; }
  .d3-account-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap; gap:8px; }
  .d3-account-row:last-child { border-bottom:none; }

</style>
</head>
<body style="margin:0;">
<div class="d3-root" id="d3-app">Chargement…</div>
<script src="/app.js"></script>
</body>
</html>
